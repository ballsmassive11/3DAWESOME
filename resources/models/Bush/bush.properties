# Model properties for Lowpoly_tree_sample.obj
#
# pivot: the point in model space that maps to the object's world position.
# When you call setPosition(x, y, z), the vertex at (pivot.x, pivot.y, pivot.z)
# in model space will land exactly at (x, y, z) in the world.
# Default is (0, 0, 0) if this file is absent.
#
# For this tree the trunk base sits at y = -0.903 in the OBJ,
# so setting pivot.y = -0.903 means setPosition(x, terrainHeight, z) places
# the base flush with the terrain without any manual offset.

pivot.x = 0
pivot.y = -0.3
pivot.z = 0
